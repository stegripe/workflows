name: Docker Build and Push (GitHub Container Registry)

on:
  workflow_call:

jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - name: Log in to GitHub Container Registry
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract release tag
        id: extract_tag
        if: ${{ github.event_name == 'release' }}
        run: echo "TAG_NAME=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
      - name: Determine image flavor
        id: flavor
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "FLAVOR=" >> "$GITHUB_OUTPUT"
          else
            echo "FLAVOR=-dev" >> "$GITHUB_OUTPUT"
          fi
      - name: Normalize repository name (lowercase)
        id: repo_name
        run: |
          echo "REPO_LOWERCASE=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Generate Docker image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ghcr.io/${{ steps.repo_name.outputs.REPO_LOWERCASE }}
          flavor: |
            latest=auto
            suffix=${{ steps.flavor.outputs.FLAVOR }}
          tags: |
            ${{ steps.extract_tag.outputs.TAG_NAME }}
            latest
      - name: Build and push Docker image (amd64)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          build-args: |
            COMMIT_SHA=${{ github.sha }}
      - name: Rotate Buildx cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache || true
