name: PNPM Lint and Compile

on:
  workflow_call:

jobs:
  lint:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 2
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.17.0
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .node-version
          check-latest: false
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --config.strict-dep-builds=false --config.dangerously-allow-all-builds=true
        env:
          PNPM_CONFIG_MINIMUM_RELEASE_AGE: 0
      - name: Lint code
        run: pnpm --config.verify-deps-before-run=false --config.strict-dep-builds=false run lint
        env:
          PNPM_CONFIG_MINIMUM_RELEASE_AGE: 0

  compile:
    needs: lint
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 2
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.17.0
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .node-version
          check-latest: false
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --config.strict-dep-builds=false --config.dangerously-allow-all-builds=true
        env:
          PNPM_CONFIG_MINIMUM_RELEASE_AGE: 0
      - name: Compile code
        run: pnpm --config.verify-deps-before-run=false --config.strict-dep-builds=false run build && rm -rf dist
        env:
          PNPM_CONFIG_MINIMUM_RELEASE_AGE: 0
