name: PNPM Publish (NPM and GitHub Registry)

on:
  workflow_call:

jobs:
  publish:
    runs-on: self-hosted
    strategy:
      matrix:
        include:
          - registry: https://registry.npmjs.org/
            token_secret_key: NPM_TOKEN
          - registry: https://npm.pkg.github.com/
            token_secret_key: GITHUB_TOKEN
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2
      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: latest
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          check-latest: true
          cache: pnpm
          registry-url: ${{ matrix.registry }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build project (if present)
        run: pnpm run --if-present build
      - name: Publish package to npm and GitHub Packages registry
        run: pnpm run release --registry ${{ matrix.registry }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets[matrix.token_secret_key] }}
