name: PNPM Publish (NPM and GitHub Registry)

on:
  workflow_call:

jobs:
  publish:
    runs-on: self-hosted
    strategy:
      matrix:
        include:
          - registry: https://registry.npmjs.org/
            token_secret_key: NPM_TOKEN
          - registry: https://npm.pkg.github.com/
            token_secret_key: GITHUB_TOKEN
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 2
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: latest
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          check-latest: true
          cache: pnpm
          registry-url: ${{ matrix.registry }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          PNPM_CONFIG_MINIMUM_RELEASE_AGE: 0
      - name: Build project (if present)
        run: pnpm run --if-present build
      - name: Publish package to npm and GitHub Packages registry
        run: pnpm run release --registry ${{ matrix.registry }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets[matrix.token_secret_key] }}
      - name: Cleanup
        uses: atos-actions/clean-self-hosted-runner@c6ce136031329a4435508e02b3f97fd85353f744 # v1
        if: ${{ always() }}
