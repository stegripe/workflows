name: CodeQL Analyze (JavaScript/TypeScript)

on:
  workflow_call:
    inputs:
      runner:
        description: Runner label for the analysis job.
        type: string
        required: false
        default: self-hosted
      node-version-file:
        description: Path to the Node version file in the caller repository.
        type: string
        required: false
        default: .node-version
      build-mode:
        description: CodeQL build mode. Use none or autobuild.
        type: string
        required: false
        default: none

jobs:
  analyze:
    runs-on: ${{ inputs.runner }}
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: ${{ inputs['node-version-file'] }}
          check-latest: true
      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          languages: javascript-typescript
          build-mode: ${{ inputs['build-mode'] }}
      - name: Autobuild
        if: ${{ inputs['build-mode'] == 'autobuild' }}
        uses: github/codeql-action/autobuild@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          category: /language:javascript-typescript
