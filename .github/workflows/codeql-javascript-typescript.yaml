name: CodeQL Analyze (JavaScript/TypeScript)

on:
  workflow_call:
    inputs:
      runner:
        description: Runner label for the analysis job.
        type: string
        required: false
        default: self-hosted
      node-version-file:
        description: Path to the Node version file in the caller repository.
        type: string
        required: false
        default: .node-version
      build-mode:
        description: CodeQL build mode. Use none or autobuild.
        type: string
        required: false
        default: none

jobs:
  analyze:
    runs-on: ${{ inputs.runner }}
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ${{ inputs['node-version-file'] }}
          check-latest: true
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          languages: javascript-typescript
          build-mode: ${{ inputs['build-mode'] }}
      - name: Autobuild
        if: ${{ inputs['build-mode'] == 'autobuild' }}
        uses: github/codeql-action/autobuild@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          category: /language:javascript-typescript
